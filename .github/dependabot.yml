version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
- package-ecosystem: npm
  directory: "/generation-ui/"
  schedule:
    interval: monthly
    time: "10:00"
    timezone: Europe/Amsterdam
- package-ecosystem: gradle
  directory: "/generator/"
  schedule:
    interval: monthly
- package-ecosystem: gradle
  directory: "/server/"
  schedule:
    interval: monthly
