# Multipart file upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Graceful shutdown — let in-flight requests complete before stopping
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/zip
server.compression.min-response-size=1024
