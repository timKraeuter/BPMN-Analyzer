sonar.projectKey=timkraeuter_Groove_Rule_Generation_Generation-UI
sonar.organization=timkraeuter

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=timkraeuter_Groove_Rule_Generation_UI
sonar.projectVersion=1.0

sonar.javascript.lcov.reportPaths=coverage/generation-ui/lcov.info

# Exclude test and config files from source analysis (they are not production code)
sonar.exclusions=**/*.spec.ts,e2e/**,karma.conf.js,src/test.ts

# Exclude test files from duplication detection (test setup code is inherently repetitive)
sonar.cpd.exclusions=**/*.spec.ts,e2e/**
